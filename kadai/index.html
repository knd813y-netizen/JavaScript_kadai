<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <!-- スマホなどで、画面幅に合わせて表示するための設定 -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>登山クイズ</title>
        <link rel="stylesheet" href="./css/style.css">
    </head>

    <body>
        <main class="app">
            <section class="quiz-area">
                <p class="label">Yama Quiz</p>
                <h1>登山クイズ</h1>
                <p id="statusMessage">問題データを読み込んでいます。</p>

                <!-- カテゴリ・難易度・出題数を選択するメニュー画面 -->
                <div id="menuBox" class="menu-box hidden">
                    <div class="setting-group">
                        <label for="categorySelect">カテゴリ</label>
                        <select id="categorySelect">
                            <option value="">カテゴリを選択</option>
                            <option value="all">すべて</option>
                            <option value="装備">装備</option>
                            <option value="山の知識">山の知識</option>
                            <option value="登山マナー">登山マナー</option>
                            <option value="危険回避・行動判断">危険回避・行動判断</option>
                            <option value="豆知識編">豆知識編</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <label for="difficultySelect">難易度</label>
                        <select id="difficultySelect">
                            <option value="">難易度を選択</option>
                            <option value="all">すべて</option>
                            <option value="初級">初級</option>
                            <option value="中級">中級</option>
                            <option value="上級">上級</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <label for="questionCountSelect">出題数</label>
                        <select id="questionCountSelect">
                            <option value="5">5問</option>
                            <option value="10">10問</option>
                            <option value="all">条件に合う全問</option>
                        </select>
                    </div>

                    <p id="menuMessage" class="menu-message">カテゴリと難易度を選択してください。</p>
                    <div class="menu-actions">
                        <button id="startButton" class="primary-button" type="button" disabled>選択した条件で開始</button>
                        <button id="randomButton" class="secondary-button" type="button">完全ランダムで開始</button>
                    </div>
                </div>

                <!-- クイズ画面 -->
                <div id="quizBox" class="quiz-box hidden">
                    <p id="progressText" class="progress-text"></p>
                    <p id="categoryText" class="category"></p>
                    <h2 id="questionText"></h2>
                    <div id="choices" class="choices"></div>
                    <p id="resultText" class="result"></p>
                    <p id="explanationText" class="explanation"></p>
                    <button id="nextButton" class="primary-button hidden" type="button">次の問題へ</button>
                </div>

                <!-- 全問題終了後に表示する結果画面 -->
                <div id="resultBox" class="result-box hidden">
                    <h2>クイズ結果</h2>
                    <p id="finalScoreText" class="final-score"></p>
                    <div class="menu-actions">
                        <button id="retryButton" class="primary-button" type="button">同じ条件でもう一度</button>
                        <button id="menuButton" class="secondary-button" type="button">メニューに戻る</button>
                    </div>
                </div>
            </section>
        </main>

        <script src="./mountain_quiz.js"></script>
    </body>
</html>
